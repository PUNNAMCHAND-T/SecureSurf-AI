# Render deployment configuration
# Deploy command: uvicorn main:app --host 0.0.0.0 --port $PORT

services:
  - type: web
    name: securesurf-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
